# mise: https://mise.jdx.dev/
#
# `mise install` installs everything under [tools]; `mise run <task>`
# dispatches to uv. `pyproject.toml`'s `requires-python` remains
# authoritative — mise reads it.

[tools]
python = "3.14"
uv = "latest"

[env]
_.file = { path = ".env", optional = true }

[tasks.init]
description = "Rename this template to a new project (see scripts/init.py)"
run = "python3 scripts/init.py"

[tasks.install]
description = "uv sync (all groups)"
run = "uv sync --all-groups"

[tasks.lint]
description = "ruff check + ruff format --check"
run = ["uv run ruff check .", "uv run ruff format --check ."]

[tasks.format]
description = "ruff format + ruff check --fix"
run = ["uv run ruff format .", "uv run ruff check --fix ."]

[tasks.typecheck]
description = "basedpyright strict"
run = "uv run basedpyright"

[tasks.test]
description = "pytest with coverage"
run = "uv run pytest"

[tasks.ci]
description = "Full CI gate"
depends = ["lint", "typecheck", "test"]
